# =============================================================================
# Jenkins Configuration as Code (JCasC)
# Applied automatically on first boot – no setup wizard needed.
#
# ⚠️  SECRETS: All sensitive values are read from environment variables.
#     Copy .env.example → .env, fill in values, then start Docker Compose.
#     Never hard-code tokens here; this file IS committed to git.
# =============================================================================

jenkins:
  systemMessage: "Patient Management Service – CI/CD Pipeline"
  numExecutors: 2
  mode: NORMAL
  scmCheckoutRetryCount: 2

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          # Read from JENKINS_ADMIN_PASSWORD env var (set in .env)
          password: "${JENKINS_ADMIN_PASSWORD}"
          name: "Admin"
          properties:
            - mailer:
                emailAddress: "admin@localhost"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  globalNodeProperties:
    - envVars:
        env:
          - key: SONAR_HOST_URL
            value: "http://sonarqube:9000"
          - key: APP_IMAGE_NAME
            value: "pmanagement-service"
          - key: APP_PORT
            value: "9081"
          - key: GITHUB_REPO_URL
            value: "https://github.com/joeltadeu/tus-microservices-assignment-1.git"
          - key: GITHUB_REPO_BRANCH
            value: "master"

tool:
  maven:
    installations:
      - name: "Maven 3"
        properties:
          - installSource:
              installers:
                - maven:
                    id: "3.9.9"
  git:
    installations:
      - name: "Default"
        home: "git"

credentials:
  system:
    domainCredentials:
      - credentials:
          # ── SonarQube token ────────────────────────────────────────────────
          # Value comes from SONAR_TOKEN env var (set in .env)
          - string:
              id: "SONAR_TOKEN"
              secret: "${SONAR_TOKEN}"
              description: "SonarQube authentication token"
              scope: GLOBAL

          # ── GitHub Personal Access Token ───────────────────────────────────
          # Value comes from GITHUB_USERNAME / GITHUB_TOKEN env vars (set in .env)
          - usernamePassword:
              id: "GITHUB_CREDENTIALS"
              description: "GitHub Personal Access Token"
              username: "${GITHUB_USERNAME}"
              password: "${GITHUB_TOKEN}"
              scope: GLOBAL

          # ── GitHub Webhook Secret ──────────────────────────────────────────
          # Shared secret between GitHub and Jenkins for webhook validation.
          # Value comes from GITHUB_WEBHOOK_SECRET env var (set in .env)
          - string:
              id: "GITHUB_WEBHOOK_SECRET"
              secret: "${GITHUB_WEBHOOK_SECRET}"
              description: "GitHub webhook secret for payload validation"
              scope: GLOBAL

unclassified:
  location:
    url: "${JENKINS_URL}"
    adminAddress: "admin@localhost"

  sonarGlobalConfiguration:
    buildWrapperEnabled: true
    installations:
      - name: "SonarQube"
        serverUrl: "http://sonarqube:9000"
        credentialsId: "SONAR_TOKEN"

  # ── GitHub plugin global configuration ──────────────────────────────────────
  # Enables Jenkins to receive and validate GitHub webhook payloads.
  githubPluginConfig:
    configs:
      - name: "GitHub"
        apiUrl: "https://api.github.com"
        credentialsId: "GITHUB_CREDENTIALS"
        manageHooks: false   # Set true only if you want Jenkins to auto-register hooks

  timestamper:
    allPipelines: true

jobs:
  - script: >
      pipelineJob('pmanagement-service-pipeline') {
        description('Patient Management Service – CI/CD pipeline. Triggered automatically on push/merge to master.')

        triggers {
          githubPush()
        }

        properties {
          githubProjectUrl('https://github.com/joeltadeu/tus-microservices-assignment-1/')
        }

        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/joeltadeu/tus-microservices-assignment-1.git')
                  credentials('GITHUB_CREDENTIALS')
                }
                branch('*/master')
                extensions {
                  cleanBeforeCheckout()
                }
              }
            }
            scriptPath('Jenkinsfile')
            lightweight(true)
          }
        }
      }
