---
# Jenkins Configuration as Code
# Applied automatically on first boot – no setup wizard needed.

jenkins:
  systemMessage: "Patient Management Service – CI/CD Pipeline"
  numExecutors: 2
  mode: NORMAL
  scmCheckoutRetryCount: 2

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin"
          name: "Admin"
          properties:
            - mailer:
                emailAddress: "admin@localhost"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  globalNodeProperties:
    - envVars:
        env:
          - key: SONAR_HOST_URL
            value: "http://sonarqube:9000"
          - key: APP_IMAGE_NAME
            value: "pmanagement-service"
          - key: APP_PORT
            value: "9081"
          - key: GITHUB_REPO_URL
            value: "https://github.com/joeltadeu/tus-microservices-assignment-1.git"
          - key: GITHUB_REPO_BRANCH
            value: "master"



tool:
  maven:
    installations:
      - name: "Maven 3"
        properties:
          - installSource:
              installers:
                - maven:
                    id: "3.9.9"
  git:
    installations:
      - name: "Default"
        home: "git"

credentials:
  system:
    domainCredentials:
      - credentials:
          # SonarQube analysis token (update after running sonar-setup.sh)
          - string:
              id: "SONAR_TOKEN"
              secret: "squ_changeme_after_first_login"
              description: "SonarQube authentication token"
              scope: GLOBAL

          # GitHub Personal Access Token
          # Generate at: https://github.com/settings/tokens
          # Required scopes: repo, admin:repo_hook
          # Leave as-is if repo is public (token only needed for webhooks or private repos)
          - usernamePassword:
              id: "GITHUB_CREDENTIALS"
              description: "GitHub Personal Access Token"
              scope: GLOBAL

unclassified:
  sonarGlobalConfiguration:
    buildWrapperEnabled: true
    installations:
      - name: "SonarQube"
        serverUrl: "http://sonarqube:9000"
        credentialsId: "SONAR_TOKEN"

  timestamper:
    allPipelines: true

jobs:
  - script: >
      pipelineJob('pmanagement-service-pipeline') {
        description('Patient Management Service – CI/CD pipeline. Click Build Now to run.')

        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/joeltadeu/tus-microservices-assignment-1.git')
                  credentials('GITHUB_CREDENTIALS')
                }
                branch('*/master')
                extensions {
                  cleanBeforeCheckout()
                }
              }
            }
            scriptPath('Jenkinsfile')
            lightweight(true)
          }
        }
      }
